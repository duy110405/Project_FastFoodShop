name: SonarCloud
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: 'zulu'

      # BƯỚC 1: Chỉ dịch (compile) code Java để tạo ra file .class cho Sonar đọc
      - name: Build Java Backend
        run: |
          cd backend
          mvn -B clean compile -DskipTests

      # BƯỚC 2: Dùng Máy quét đa năng đứng ở ngoài cùng để quét cả 2 thư mục
      - name: SonarCloud Scan (Universal)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: -Dsonar.projectKey=duy110405_Project_FastFoodShop -Dsonar.organization=duy110405 -Dsonar.sources=backend/src/main,frontend -Dsonar.java.binaries=backend/target/classes -Dsonar.exclusions=**/node_modules/**
